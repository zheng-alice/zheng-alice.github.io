<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{ name }}</title>
	<link rel="stylesheet" href="style.css">
	<link rel="preload" href="fonts/palladiourw_reg.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="preload" href="fonts/palladiourw_bol.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="preload" href="fonts/palladiourw_regita.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="icon" href="icons/favicon.svg" sizes="any" type="image/svg+xml">
	<link rel="mask-icon" href="icons/favicon.svg" color="#005fb3">
	<link rel="canonical" href="{{ base }}">
	<meta name="author" content="{{ name }}">
	<meta name="description" content="A Ph.D. candidate at Virginia Tech, interested in quantum information theory and online learning. See within for a list of preprints and publications.">
	<meta name="theme-color" content="#e0f1ff">
	<meta property="og:title" content="{{ name }}'s Homepage">
	<meta property="og:image" content="{{ base }}/images/profile800.webp">
	<meta property="og:image:width" content="740">
	<meta property="og:image:height" content="800">
	<meta property="og:image" content="{{ base }}/images/landscape675.webp">
	<meta property="og:image:width" content="1200">
	<meta property="og:image:height" content="675">
	<script type="application/ld+json">
	{
		"@context": "https://schema.org",
		"@type": "ProfilePage",
		"dateModified": "{{ datetime_iso }}",
		"mainEntity": {
			"@id": "#alice-zheng",
			"@type": "Person",
			"name": "{{ name }}",
			"url": "{{ base }}",
			"image": "images/profile800.webp",
			"sameAs": [
			{%- for icon in icons %}
				"{{ icon[2] }}"{% if not loop.last %},{% endif %}
			{%- endfor %}
			],
			"description": "{{ name }} is a Ph.D. candidate at Virginia Tech, working at the intersection of quantum and learning theory.",
			"affiliation": {
				"@type": "CollegeOrUniversity",
				"name": "Virginia Tech",
				"url": "https://www.vt.edu",
				"sameAs": "https://en.wikipedia.org/wiki/Virginia_Tech"
			}
		}
	}
	</script>
</head>
<body>
	<header>
		<picture>
			<source media="screen and (max-width: 499px)"
				srcset="images/head125.webp 1x, images/head250.webp 2x, images/head375.webp 3x, images/head500.webp 4x">
			<img class="profile" src="images/profile200.webp"
				srcset="images/profile400.webp 2x, images/profile600.webp 3x, images/profile800.webp 4x"
				alt="{{ name }}'s profile picture" height="200" style="aspect-ratio: 37/40;">
		</picture>
		<div>
			<h1>{{ name }}</h1>
			email: <span class="class">al<span>ice</span>zh<!--ou-->eng&#64;<span>mail&#46;</span>v<script>document.write('t'+'&'+'#'+'4'+'6'+';'+'e');</script>du</span>
		</div>
	</header>
	<main role="main">
{% include 'bio.html' %}
	<h2>Preprints and Publications <span class="nobr">(see also
	{%- for icon in icons %}
		<a href="{{ icon[2] }}" class="icon" title="{{ icon[0] }}">
			<img class="icon-color" src="icons/{{ icon[1] }}.svg" alt="{{ icon[0] }} (selected)">
			<img class="icon-mono" src="icons/{{ icon[1] }}-invert.svg" alt="{{ icon[0] }}">
		</a>
	{%- endfor -%}
	)</span></h2>
{% include 'ref.html' %}
	</main>
	<footer>
		<span class="note">
			Last updated {{ date }}.
			[<a href="{{ source }}">Source</a>]
		</span>
	</footer>
	<script src="script.js" defer></script>
</body>
</html>
